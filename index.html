
<!DOCTYPE html>
<html>
<body>
  <h1>Check Exam Result</h1>
  Form: <select id="form"><option value="1">Form 1</option></select><br><br>
  Exam No: <input id="examNo" type="text"><br><br>
  DOB: <input id="dob" type="date"><br><br>
  <button onclick="checkResult()">Check</button>
  <div id="result"></div>

  <script>
    function checkResult() {
      const form = document.getElementById('form').value;
      const examNo = document.getElementById('examNo').value.trim();
      const dob = document.getElementById('dob').value.split('-').reverse().join('/'); // dd/mm/yyyy
      const csvFile = `form${form}.csv`;

      fetch(csvFile)
        .then(r => r.text())
        .then(data => {
          const rows = data.split('\n').filter(r => r); // remove empty rows
          if (rows.length < 2) {
            document.getElementById('result').innerHTML = 'CSV file has insufficient rows';
            return;
          }
          const headers = rows[1].split(',').slice(4, 58); // row 2, cols E–BF
          for (let row of rows.slice(2)) { // skip header rows
            const cols = row.split(',');
            if (cols.length < 58) continue; // skip invalid rows
            if (cols[1] && cols[2] && cols[1].trim() === examNo && cols[2].trim() === dob) {
              let html = `<h3>${cols[3]}</h3>`;
              html += `<table border="1">`;
              headers.forEach((header, i) => {
                html += `<tr><th>${header}</th><td>${cols[i + 4] || ''}</td></tr>`;
              });
              html += `</table>`;
              document.getElementById('result').innerHTML = html;
              return;
            }
          }
          document.getElementById('result').innerHTML = 'No match found';
        })
        .catch(err => {
          document.getElementById('result').innerHTML = 'Error: ' + err.message;
        });
    }
  </script>
</body>
</html>
